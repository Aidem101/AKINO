---
env:
  contexts:
    - name: AKINO localhost
      urls:
        - http://127.0.0.1:8144
      includePaths:
        - http://127\.0\.0\.1:8144/.*
      excludePaths:
        - http://127\.0\.0\.1:8144/(?:logout|admin_logout)\.php.*
        - http://127\.0\.0\.1:8144/Admin\.php.*
  parameters:
    failOnError: true
    failOnWarning: false
    continueOnFailure: true
    progressToStdout: true

jobs:
  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 20
      scanOnlyInScope: true
      maxBodySizeInBytesToScan: 1048576

  - type: requestor
    requests:
      - url: http://127.0.0.1:8144/Home.php
      - url: http://127.0.0.1:8144/Films_Catalog.php
      - url: http://127.0.0.1:8144/Catalog.php?type=series
      - url: http://127.0.0.1:8144/About_Us.php
      - url: http://127.0.0.1:8144/Admin_Login.php

  - type: spider
    parameters:
      context: AKINO localhost
      url: http://127.0.0.1:8144/Home.php
      maxDuration: 3
      maxDepth: 8
      maxChildren: 100

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  - type: report
    parameters:
      template: risk-confidence-html
      reportDir: ../artifacts/zap-20260614
      reportFile: akino-zap-passive
      reportTitle: AKINO — пассивное сканирование OWASP ZAP
      reportDescription: Публичная часть локального стенда до активного сканирования.

  - type: activeScan
    parameters:
      context: AKINO localhost
      url: http://127.0.0.1:8144
      maxRuleDurationInMins: 1
      maxScanDurationInMins: 15

  - type: passiveScan-wait
    parameters:
      maxDuration: 5

  - type: report
    parameters:
      template: risk-confidence-html
      reportDir: ../artifacts/zap-20260614
      reportFile: akino-zap-full
      reportTitle: AKINO — полный отчёт OWASP ZAP
      reportDescription: Пассивное и активное сканирование публичной части локального стенда.

  - type: report
    parameters:
      template: traditional-json
      reportDir: ../artifacts/zap-20260614
      reportFile: akino-zap-full
      reportTitle: AKINO — полный отчёт OWASP ZAP
      reportDescription: Машиночитаемый отчёт пассивного и активного сканирования.
